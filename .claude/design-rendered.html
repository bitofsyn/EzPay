/* EzPay — Color tokens
   Derived from the EzPay React app (Tailwind default palette in use).
   Base scales first, semantic aliases second. */

:root {
  /* ----- Neutrals: Slate (primary neutral ramp) ----- */
  --slate-50:  #f8fafc;
  --slate-100: #f1f5f9;
  --slate-200: #e2e8f0;
  --slate-300: #cbd5e1;
  --slate-400: #94a3b8;
  --slate-500: #64748b;
  --slate-600: #475569;
  --slate-700: #334155;
  --slate-800: #1e293b;
  --slate-900: #0f172a;

  /* ----- Neutrals: Gray (used for muted surfaces / borders) ----- */
  --gray-50:  #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-800: #1f2937;

  /* ----- Brand accent: Cyan ----- */
  --cyan-50:  #ecfeff;
  --cyan-100: #cffafe;
  --cyan-400: #22d3ee;
  --cyan-500: #06b6d4;
  --cyan-600: #0891b2;
  --cyan-700: #0e7490;

  /* ----- Sky (incoming money, charts, indicators) ----- */
  --sky-50:  #f0f9ff;
  --sky-100: #e0f2fe;
  --sky-400: #38bdf8;
  --sky-500: #0ea5e9;
  --sky-600: #0284c7;

  /* ----- Blue (links, focus rings, secondary CTA) ----- */
  --blue-50:  #eff6ff;
  --blue-100: #dbeafe;
  --blue-200: #bfdbfe;
  --blue-500: #3b82f6;
  --blue-600: #2563eb;
  --blue-700: #1d4ed8;

  /* ----- Rose (outgoing money, alerts) ----- */
  --rose-50:  #fff1f2;
  --rose-100: #ffe4e6;
  --rose-400: #fb7185;
  --rose-500: #f43f5e;

  /* ----- Red (form errors) ----- */
  --red-50:  #fef2f2;
  --red-500: #ef4444;
  --red-600: #dc2626;

  /* ===== Semantic aliases ===== */

  /* Actions — the app's primary button is dark slate, brand CTA is cyan */
  --color-primary:        var(--slate-900);
  --color-primary-hover:  var(--slate-800);
  --color-primary-text:   #ffffff;

  --color-accent:         var(--cyan-600);
  --color-accent-hover:   var(--cyan-700);
  --color-accent-soft:    var(--cyan-50);
  --color-accent-soft-text: var(--cyan-700);

  --color-link:           var(--blue-600);
  --color-link-hover:     var(--blue-700);

  /* Money semantics */
  --color-income:         var(--sky-600);   /* 입금 / deposit */
  --color-income-soft:    var(--sky-50);
  --color-expense:        var(--rose-500);  /* 출금 / withdrawal */
  --color-expense-soft:   var(--rose-50);
  --color-chart-line:     var(--sky-400);
  --color-chart-line-alt: var(--cyan-400);

  /* Feedback */
  --color-danger:         var(--red-500);
  --color-danger-text:    var(--red-500);

  /* Surfaces */
  --surface-card:    #ffffff;
  --surface-muted:   var(--gray-50);
  --surface-sunken:  var(--slate-100);
  --surface-overlay: rgba(0, 0, 0, 0.45);

  /* Text */
  --text-strong:  var(--slate-900);
  --text-body:    var(--slate-700);
  --text-muted:   var(--slate-500);
  --text-faint:   var(--slate-400);
  --text-on-dark: #ffffff;

  /* Borders & rings */
  --border-default: var(--slate-200);
  --border-soft:    var(--gray-200);
  --ring-focus:     var(--blue-200);
}

/* EzPay — Typography tokens
   App stack: Inter (Latin/numerals) + Apple SD Gothic Neo / Noto Sans KR (Hangul). */

:root {
  /* Families */
  --font-sans: "Inter", "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", system-ui, sans-serif;
  --font-mono: "Menlo", "Monaco", "Consolas", "Courier New", monospace;
  /* Tabular numerals for money figures */
  --font-numeric: "Inter", "Noto Sans KR", system-ui, sans-serif;

  /* Type scale (matches Tailwind sizes used across the app) */
  --text-xs:   0.75rem;   /* 12px — meta, timestamps, helper */
  --text-sm:   0.875rem;  /* 14px — body, labels, list rows */
  --text-base: 1rem;      /* 16px — default */
  --text-lg:   1.125rem;  /* 18px — card titles, account name */
  --text-xl:   1.25rem;   /* 20px — section headings, amounts */
  --text-2xl:  1.5rem;    /* 24px — page titles, balances */
  --text-3xl:  1.875rem;  /* 30px — signup heading */
  --text-4xl:  2.25rem;   /* 36px — hero / brand */

  /* Weights */
  --weight-normal:    400;
  --weight-medium:    500;
  --weight-semibold:  600;
  --weight-bold:      700;
  --weight-extrabold: 800;

  /* Line heights */
  --leading-tight:   1.2;
  --leading-snug:    1.35;
  --leading-normal:  1.5;
  --leading-relaxed: 1.75;  /* used for body copy blocks (leading-7) */

function SvgIcon({d, size=18, stroke='currentColor', sw=2}) {

/* ─── mini line chart (SVG) ─── */
function MiniLine({data, color='#0891b2', height=48}) {
  const W=120,H=height,P=4;
  const vals=data.map(d=>d.v);
  const lo=Math.min(...vals),hi=Math.max(...vals);
  const cx=(i)=>P+i/(vals.length-1)*(W-2*P);
  const cy=(v)=>P+(1-(v-lo)/(hi-lo||1))*(H-2*P);
  const pts=vals.map((v,i)=>({x:cx(i),y:cy(v)}));
  const path=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(' ');
  const area=path+` L${pts[pts.length-1].x},${H-P} L${pts[0].x},${H-P} Z`;
  return (
    <svg width={W} height={H} style={{display:'block'}}>
      <defs>
        <linearGradient id={`mg_${color.slice(1)}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#mg_${color.slice(1)})`}/>
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* ─── main line chart ─── */
function LineChart({data}) {
  const W=340,H=120,PX=24,PY=14;
  const vals=data.map(d=>d.v);
  const lo=Math.min(...vals),hi=Math.max(...vals);
  const cx=(i)=>PX+i/(data.length-1)*(W-2*PX);
  const cy=(v)=>PY+(1-(v-lo)/(hi-lo||1))*(H-2*PY);
  const pts=data.map((d,i)=>({x:cx(i),y:cy(d.v),...d}));
  const path=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(' ');
  const area=path+` L${pts[pts.length-1].x},${H-PY} L${pts[0].x},${H-PY} Z`;
  const [tip,setTip]=useState(null);
  return (
    <div style={{position:'relative'}}>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block'}}>
        <defs>
          <linearGradient id="lcg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#0891b2" stopOpacity="0.2"/>
            <stop offset="100%" stopColor="#0891b2" stopOpacity="0"/>
          </linearGradient>
        </defs>
        {[0.25,0.5,0.75].map(r=>(
          <line key={r} x1={PX} y1={PY+(1-r)*(H-2*PY)} x2={W-PX} y2={PY+(1-r)*(H-2*PY)} stroke="#e2e8f0" strokeWidth="1"/>
        ))}
        <path d={area} fill="url(#lcg)"/>
        <path d={path} fill="none" stroke="#0891b2" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <circle key={i} cx={p.x} cy={p.y} r="4" fill="#fff" stroke="#0891b2" strokeWidth="2.5" style={{cursor:'pointer'}}

        <div style={{background:'#fff',borderRadius:12,padding:'14px 18px',boxShadow:'0 1px 6px rgba(0,0,0,.05)',display:'flex',flexDirection:'column',gap:10}}>

            <div style={{flex:'1 1 200px',position:'relative'}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2.5" style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input value={kw} onChange={e=>setKw(e.target.value)} placeholder="거래 ID, 이름, 메모 검색…"
                style={{width:'100%',padding:'7px 10px 7px 28px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:12,outline:'none',background:'#f8fafc'}}

                onBlur={e=>e.target.style.borderColor='#e2e8f0'}/>
            </div>
            <div style={{display:'flex',gap:6,alignItems:'center',flex:'1 1 220px'}}>
              <label style={{fontSize:10,color:'#94a3b8',whiteSpace:'nowrap',fontWeight:600}}>기간</label>
              <input type="date" value={from} onChange={e=>setFrom(e.target.value)}
                style={{flex:1,padding:'6px 8px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:11,outline:'none',background:'#f8fafc'}}
                onFocus={e=>e.target.style.borderColor='#334155'}
                onBlur={e=>e.target.style.borderColor='#e2e8f0'}/>
              <span style={{fontSize:10,color:'#cbd5e1'}}>—</span>
              <input type="date" value={to} onChange={e=>setTo(e.target.value)}

                onBlur={e=>e.target.style.borderColor='#e2e8f0'}/>
            </div>
          </div>
          <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginRight:2}}>구분</span>
            {['전체','입금','출금'].map(d=>(<Pill key={d} label={d} active={dir===d} onClick={()=>setDir(d)}/>))}
            <span style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginLeft:10,marginRight:2}}>상태</span>
            {STATUSES_FILTER.map(s=>(<Pill key={s} label={s==='전체'?'전체':STATUS_KO[s]} active={stat===s} onClick={()=>setStat(s)}/>))}
            <span style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginLeft:10,marginRight:2}}>카테고리</span>
            {CATS.slice(0,7).map(c=>(<Pill key={c} label={c} active={cat===c} onClick={()=>setCat(c)}/>))}
            {hasFilter&&<button onClick={resetFilters} style={{marginLeft:'auto',fontSize:11,color:'#94a3b8',background:'none',border:'none',fontWeight:600,cursor:'pointer'}}>초기화</button>}
          </div>
        </div>

        {/* ── 거래 목록 ── */}
        <div style={{background:'#fff',borderRadius:12,boxShadow:'0 1px 6px rgba(0,0,0,.05)',overflow:'hidden'}}>
          <div style={{display:'grid',gridTemplateColumns:'minmax(0,1fr) 60px 130px 60px 130px',padding:'9px 20px',background:'#f8fafc',borderBottom:'1px solid #f1f5f9'}}>
            {['거래 정보','구분','금액','상태','일시'].map(h=>(
              <span key={h} style={{fontSize:10,fontWeight:700,color:'#94a3b8',letterSpacing:'.3px'}}>{h}</span>
            ))}
          </div>
          {paged.length===0 ? (
            <div style={{padding:'56px 20px',textAlign:'center'}}>
              <p style={{fontSize:14,fontWeight:700,color:'#334155',marginBottom:6}}>검색 결과가 없습니다</p>
              <p style={{fontSize:12,color:'#94a3b8',marginBottom:16}}>필터 조건을 변경하거나 키워드를 수정해 보세요.</p>
              {hasFilter&&<button onClick={resetFilters} style={{padding:'8px 18px',background:'#0f172a',color:'#fff',border:'none',borderRadius:8,fontWeight:700,fontSize:12,cursor:'pointer'}}>필터 초기화</button>}
            </div>
          ) : paged.map((tx,i)=>(
            <div key={tx.id} onClick={()=>setModal(tx)}
              style={{display:'grid',gridTemplateColumns:'minmax(0,1fr) 60px 130px 60px 130px',padding:'12px 20px',borderBottom:i<paged.length-1?'1px solid #f8fafc':'none',cursor:'pointer',alignItems:'center',transition:'background .1s'}}
              onMouseEnter={e=>e.currentTarget.style.background='#fafafa'}
              onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
              <div style={{minWidth:0}}>
                <p style={{fontSize:12,fontWeight:700,color:'#0f172a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{tx.dir==='out'?tx.to:tx.from}</p>
                <p style={{fontSize:10,color:'#94a3b8',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{tx.id} · {tx.memo}</p>
              </div>
              <span style={{fontSize:11,fontWeight:600,color:'#475569'}}>{tx.dir==='out'?'출금':'입금'}</span>
              <span style={{fontSize:13,fontWeight:800,color:'#0f172a',fontVariantNumeric:'tabular-nums'}}>
                <span style={{fontSize:10,color:'#94a3b8',marginRight:1}}>{tx.dir==='out'?'−':'+'}₩</span>{tx.amount.toLocaleString('ko-KR')}
              </span>
              <span style={{fontSize:11,fontWeight:600,color:tx.status==='success'?'#16a34a':tx.status==='pending'?'#ca8a04':'#dc2626'}}>{STATUS_KO[tx.status]}</span>
              <span style={{fontSize:10,color:'#64748b'}}>{tx.date}</span>
            </div>
          ))}
        </div>

        {/* ── 페이지네이션 ── */}
        {totalPages>1&&(
          <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:6}}>
            <button onClick={()=>setPage(1)} disabled={safePage===1}
              style={{padding:'6px 10px',border:'1.5px solid #e2e8f0',borderRadius:8,background:'#fff',fontSize:11,fontWeight:700,color:safePage===1?'#cbd5e1':'#334155',cursor:safePage===1?'default':'pointer'}}>«</button>
            <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={safePage===1}
              style={{padding:'6px 10px',border:'1.5px solid #e2e8f0',borderRadius:8,background:'#fff',fontSize:11,fontWeight:700,color:safePage===1?'#cbd5e1':'#334155',cursor:safePage===1?'default':'pointer'}}>‹</button>
            {Array.from({length:totalPages},(_, i)=>i+1)
              .filter(p=>p===1||p===totalPages||Math.abs(p-safePage)<=1)
              .reduce((acc,p,idx,arr)=>{
                if(idx>0&&arr[idx-1]!==p-1) acc.push('…');
                acc.push(p);
                return acc;
              },[])
              .map((p,i)=>p==='…'
                ? <span key={'e'+i} style={{padding:'6px 4px',fontSize:12,color:'#94a3b8'}}>…</span>
                : <button key={p} onClick={()=>setPage(p)}
                    style={{width:32,height:32,border:`1.5px solid ${safePage===p?'#0f172a':'#e2e8f0'}`,borderRadius:8,background:safePage===p?'#0f172a':'#fff',color:safePage===p?'#fff':'#334155',fontSize:11,fontWeight:700,cursor:'pointer',transition:'all .15s'}}>{p}</button>
              )}
            <button onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={safePage===totalPages}
              style={{padding:'6px 10px',border:'1.5px solid #e2e8f0',borderRadius:8,background:'#fff',fontSize:11,fontWeight:700,color:safePage===totalPages?'#cbd5e1':'#334155',cursor:safePage===totalPages?'default':'pointer'}}>›</button>
            <button onClick={()=>setPage(totalPages)} disabled={safePage===totalPages}
              style={{padding:'6px 10px',border:'1.5px solid #e2e8f0',borderRadius:8,background:'#fff',fontSize:11,fontWeight:700,color:safePage===totalPages?'#cbd5e1':'#334155',cursor:safePage===totalPages?'default':'pointer'}}>»</button>
            <span style={{fontSize:11,color:'#94a3b8',marginLeft:6}}>{safePage} / {totalPages} 페이지</span>
          </div>
        )}
      </div>

      {/* ── 팝업 모달 ── */}
      {modal&&(
        <TxModal tx={modal} onClose={()=>setModal(null)} onViewDetail={()=>{setModal(null);onSelectTx(modal);}}/>
      )}
    </div>
  );
}

const STATUSES = ['success','success','success','pending','failed'];

function generateLog() {
  const from = NAMES[Math.floor(Math.random()*NAMES.length)];
  let to = NAMES[Math.floor(Math.random()*NAMES.length)];
  while(to===from) to = NAMES[Math.floor(Math.random()*NAMES.length)];
  const amt = (Math.floor(Math.random()*49)+1)*10000;
  const st = STATUSES[Math.floor(Math.random()*STATUSES.length)];
  const ms = Math.floor(Math.random()*800)+150;
  return {id:uuid(), from, to, amount:amt, status:st, ms, time:now()};
}

function PipelineMap({latestLog}) {
  const STAGES = [
    {key:'recv',   label:'요청 수신',    icon:'📥', desc:'API 엔드포인트 수신'},
    {key:'valid',  label:'잔액 검증',    icon:'🔍', desc:'계좌 잔액 확인'},

    {key:'event',  label:'이벤트 발행',  icon:'📡', desc:'Kafka 이벤트 게시'},
    {key:'done',   label:'완료',         icon:'✅', desc:'알림 전송'},
  ];
  const [active, setActive] = useState(0);

  useEffect(()=>{
    if(!latestLog) return;
    setActive(0);
    let i=0;
    const t = setInterval(()=>{
      i++;
      setActive(i);
      if(i>=STAGES.length-1) clearInterval(t);
    }, 400);
    return ()=>clearInterval(t);
  },[latestLog]);

  return (
    <div style={{background:'#fff',borderRadius:16,padding:'18px 20px',boxShadow:'0 2px 12px rgba(0,0,0,.06)'}}>
      <h3 style={{fontSize:13,fontWeight:700,marginBottom:16}}>프로세스 파이프라인</h3>

        {STAGES.map((s,i)=>(
          <React.Fragment key={s.key}>
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:i<=active?'#0f172a':'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,transition:'background .3s',boxShadow:i===active?'0 0 0 4px rgba(8,145,178,.2)':'none'}}>
                {i<=active?s.icon:'○'}
              </div>
              <p style={{fontSize:9,fontWeight:600,color:i<=active?'#0f172a':'#94a3b8',textAlign:'center',lineHeight:1.3}}>{s.label}</p>
              <p style={{fontSize:8,color:'#cbd5e1',textAlign:'center',lineHeight:1.3}}>{s.desc}</p>
            </div>
            {i<STAGES.length-1 && (
              <div style={{width:24,height:2,background:i<active?'#0891b2':'#e2e8f0',transition:'background .3s',flexShrink:0,marginBottom:30}}/>

      </div>
      {latestLog && (
        <div style={{marginTop:14,padding:'8px 12px',background:'#f8fafc',borderRadius:8,fontSize:11,color:'#475569'}}>
          <span style={{fontFamily:'monospace',fontWeight:700}}>{latestLog.id}</span>
          {' · '}{latestLog.from}→{latestLog.to}

      )}
    </div>
  );
}

/* ─────────────────────────────────── TRANSFER VIEW */

const CATEGORIES = ['식비','교통','쇼핑','문화','생활','회비','정산','기타'];
const SUSPICIOUS_KEYWORDS = ['급하','긴급','비밀','사례금','투자','당첨','수익'];

/* Mock TransferAnalyzeService */
function analyzeTransfer({fromAccount, amount, memo, recipientName, isNewRecipient}) {
  const reasons = [];
  let score = 0;

  if(isNewRecipient) { reasons.push('처음 송금하는 수취인입니다.'); score += 2; }
  if(amount > 500000) { reasons.push('고액 송금입니다 (50만원 이상).'); score += 2; }
  else if(amount > 100000) { reasons.push('평소 송금 금액보다 큰 금액입니다.'); score += 1; }
  if(fromAccount && amount > fromAccount.balance * 0.7) { reasons.push('잔액의 70% 이상을 송금합니다.'); score += 2; }
  const hasSuspicious = SUSPICIOUS_KEYWORDS.some(k => (memo||'').includes(k) || (recipientName||'').includes(k));
  if(hasSuspicious) { reasons.push('메모에 주의가 필요한 표현이 포함되어 있습니다.'); score += 3; }

  let riskLevel, riskLabel, riskColor;
  if(score >= 5)      { riskLevel='DANGER';  riskLabel='위험';  riskColor='#ef4444'; }
  else if(score >= 2) { riskLevel='CAUTION'; riskLabel='주의';  riskColor='#f59e0b'; }
  else                { riskLevel='SAFE';    riskLabel='안전';  riskColor='#10b981'; }
  if(reasons.length===0) reasons.push('분석 결과 이상 징후가 없습니다.');

  // 카테고리 추론
  const m = (memo||'').toLowerCase();
  let recommendedCategory = '기타', categoryReason = '분류 기준이 명확하지 않아 기타로 분류합니다.';
  if(/밥|점심|저녁|카페|커피|식사|음식/.test(m)) { recommendedCategory='식비';  categoryReason='메모에 식사 관련 표현이 포함되어 있습니다.'; }
  else if(/택시|버스|지하철|교통|kTx|ktx|기차/.test(m)) { recommendedCategory='교통';  categoryReason='메모에 교통 관련 표현이 포함되어 있습니다.'; }
  else if(/정산|나눔|더치/.test(m)) { recommendedCategory='정산';  categoryReason='메모에 정산 관련 표현이 포함되어 있습니다.'; }
  else if(/회비|모임|동창/.test(m)) { recommendedCategory='회비';  categoryReason='메모에 모임/회비 관련 표현이 포함되어 있습니다.'; }
  else if(/쇼핑|구매|마트/.test(m)) { recommendedCategory='쇼핑';  categoryReason='메모에 쇼핑 관련 표현이 포함되어 있습니다.'; }
  else if(/영화|공연|문화|여행/.test(m)) { recommendedCategory='문화';  categoryReason='메모에 문화/여행 관련 표현이 포함되어 있습니다.'; }
  else if(/월세|공과금|전기|관리비|생활/.test(m)) { recommendedCategory='생활';  categoryReason='메모에 생활비 관련 표현이 포함되어 있습니다.'; }

  return { riskLevel, riskLabel, riskColor, riskReasons: reasons.slice(0,3), recommendedCategory, categoryReason };
}

    if(!prefilledRecipient) return;
    setForm(f=>({...f, toName:prefilledRecipient.name, toBank:prefilledRecipient.bank, toNumber:prefilledRecipient.accountFull}));
    setStep('form');
    if(onClearRecipient) onClearRecipient();
  },[prefilledRecipient]);
  const [analysis, setAnalysis] = useState(null);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [dangerConfirmed, setDangerConfirmed] = useState(false);
  const [errors, setErrors] = useState({});
  const [txResult, setTxResult] = useState(null);
  const analyzeTimer = useRef(null);

  const fromAccount = accounts.find(a=>a.id===form.fromAccountId);
  const amountNum = Number(String(form.amount).replace(/,/g,'')) || 0;
  const isFormPartial = form.toName.length>=1 && amountNum>0;

  // 자동 분석 (debounce 1s)
  useEffect(()=>{
    if(!isFormPartial){ setAnalysis(null); return; }
    setIsAnalyzing(true);
    clearTimeout(analyzeTimer.current);
    analyzeTimer.current = setTimeout(()=>{
      // POST /api/transfers/analyze (mock)
      const result = analyzeTransfer({
        fromAccount,
        amount: amountNum,
        memo: form.memo,
        recipientName: form.toName,
        isNewRecipient: !KNOWN_RECIPIENTS.includes(form.toName),
      });
      setAnalysis(result);
      if(!form.category) setForm(f=>({...f, category: result.recommendedCategory}));
      setIsAnalyzing(false);
    }, 900);
    return ()=>clearTimeout(analyzeTimer.current);
  },[form.toName, form.amount, form.memo, form.fromAccountId]);

  const validate = () => {
    const e={};
    if(!form.fromAccountId) e.fromAccountId='출금 계좌를 선택해주세요';
    if(!form.toNumber.trim()) e.toNumber='계좌번호를 입력해주세요';
    else if(!/^\d{10,16}$/.test(form.toNumber.replace(/-/g,''))) e.toNumber='올바른 계좌번호를 입력해주세요';
    if(!form.toName.trim()) e.toName='받는 사람 이름을 입력해주세요';
    if(!amountNum || amountNum<100) e.amount='100원 이상 입력해주세요';
    if(fromAccount && amountNum > fromAccount.balance) e.amount='잔액이 부족합니다';
    setErrors(e);
    return Object.keys(e).length===0;
  };

  const handleConfirm = () => { if(validate()) setStep('confirm'); };

  const handleSend = () => {
    // POST /api/transfers (mock)
    setTxResult({ id: uuid(), amount: amountNum, toName: form.toName, toBank: form.toBank, memo: form.memo, category: form.category, ts: new Date().toLocaleString('ko-KR') });
    setStep('done');
  };

  const inputStyle = (err) => ({width:'100%',padding:'10px 13px',border:`1.5px solid ${err?'#ef4444':'#e2e8f0'}`,borderRadius:10,fontSize:13,outline:'none',background:'#f8fafc',transition:'border .15s'});

  const RISK_BG = {SAFE:'#f0fdf4',CAUTION:'#fffbeb',DANGER:'#fef2f2'};
  const RISK_ICON = {SAFE:'✓',CAUTION:'⚠',DANGER:'✕'};

  /* ── 완료 화면 ── */
  if(step==='done' && txResult) return (
    <div className="anim-up" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{background:'#fff',borderRadius:20,padding:'40px 32px',maxWidth:420,width:'100%',textAlign:'center',boxShadow:'0 4px 24px rgba(0,0,0,.08)'}}>
        <div style={{width:64,height:64,borderRadius:'50%',background:'#f0fdf4',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 18px'}}>
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h3 style={{fontSize:18,fontWeight:900,marginBottom:8}}>송금 완료</h3>
        <p style={{fontSize:32,fontWeight:900,color:'#0f172a',fontVariantNumeric:'tabular-nums',marginBottom:4}}>−{won(txResult.amount)}</p>
        <p style={{fontSize:13,color:'#94a3b8',marginBottom:22}}>{txResult.toBank} · {txResult.toName}에게</p>
        <div style={{background:'#f8fafc',borderRadius:12,padding:'14px 16px',textAlign:'left',marginBottom:22,display:'flex',flexDirection:'column',gap:9}}>
          {[{l:'거래 ID',v:txResult.id},{l:'메모',v:txResult.memo||'—'},{l:'카테고리',v:txResult.category},{l:'처리 시각',v:txResult.ts}].map(r=>(
            <div key={r.l} style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:11,color:'#94a3b8'}}>{r.l}</span>
              <span style={{fontSize:12,fontWeight:700}}>{r.v}</span>
            </div>
          ))}
        </div>
        <button onClick={()=>{setStep('form');setForm({fromAccountId:accounts[0]?.id||'',toBank:'토스뱅크',toNumber:'',toName:'',amount:'',memo:'',category:''});setAnalysis(null);setDangerConfirmed(false);}}
          style={{width:'100%',padding:'12px',background:'#0f172a',color:'#fff',border:'none',borderRadius:14,fontWeight:700,fontSize:14}}>송금 완료 · 홈으로</button>
      </div>
    </div>
  );

  /* ── 확인 화면 ── */
  if(step==='confirm') return (
    <div className="anim-up" style={{flex:1,overflowY:'auto',padding:24,display:'flex',alignItems:'flex-start',justifyContent:'center'}}>
      <div style={{background:'#fff',borderRadius:20,padding:'28px 24px',maxWidth:460,width:'100%',boxShadow:'0 4px 24px rgba(0,0,0,.08)'}}>
        <button onClick={()=>setStep('form')} style={{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',fontSize:12,fontWeight:700,color:'#475569',marginBottom:20,cursor:'pointer'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>수정하기
        </button>
        <h3 style={{fontSize:16,fontWeight:800,marginBottom:18}}>송금 내용 확인</h3>
        <div style={{background:'linear-gradient(135deg,#1e3a8a,#155e75)',borderRadius:16,padding:'18px 20px',color:'#fff',marginBottom:18}}>
          <p style={{fontSize:11,opacity:.7,marginBottom:6}}>{fromAccount?.bankName} · {fromAccount?.accountAlias}</p>
          <p style={{fontSize:28,fontWeight:900,fontVariantNumeric:'tabular-nums'}}>−{won(amountNum)}</p>
          <p style={{fontSize:12,opacity:.8,marginTop:6}}>→ {form.toBank} {maskNumber(form.toNumber)} · {form.toName}</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:18}}>
          {[{l:'출금 계좌',v:`${fromAccount?.bankName} ${fromAccount?.accountNumberMasked}`},{l:'받는 사람',v:`${form.toName} (${form.toBank})`},{l:'메모',v:form.memo||'—'},{l:'카테고리',v:form.category},{l:'송금 금액',v:won(amountNum)},{l:'수수료',v:'무료'}].map(r=>(

        {analysis?.riskLevel==='DANGER' && (

          style={{width:'100%',padding:'13px',background:analysis?.riskLevel==='DANGER'&&!dangerConfirmed?'#e2e8f0':'#0f172a',color:analysis?.riskLevel==='DANGER'&&!dangerConfirmed?'#94a3b8':'#fff',border:'none',borderRadius:14,fontWeight:700,fontSize:14,cursor:analysis?.riskLevel==='DANGER'&&!dangerConfirmed?'not-allowed':'pointer',transition:'all .2s'}}>
          {won(amountNum)} 송금 실행
        </button>
      </div>
    </div>
  );

  /* ── 입력 폼 ── */
  return (
    <div className="anim-up" style={{flex:1,overflowY:'auto',padding:24,paddingBottom:40}}>

                <button onClick={()=>setForm(f=>({...f,toName:'',toBank:'토스뱅크',toNumber:''}))} style={{fontSize:10,color:'#94a3b8',background:'none',border:'none',cursor:'pointer'}}>초기화</button>
              </div>

          </div>

          {/* 출금 계좌 선택 */}
          <div style={{background:'#fff',borderRadius:16,padding:'18px 20px',boxShadow:'0 2px 12px rgba(0,0,0,.06)'}}>
            <p style={{fontSize:12,fontWeight:700,color:'#475569',marginBottom:12}}>출금 계좌</p>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {accounts.map(acc=>{
                const ac = BANK_COLORS[acc.bankName]||['#475569','#334155'];
                const sel = form.fromAccountId===acc.id;
                return (
                  <div key={acc.id} onClick={()=>setForm(f=>({...f,fromAccountId:acc.id}))}
                    style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',border:`2px solid ${sel?'#0891b2':'#f1f5f9'}`,borderRadius:12,cursor:'pointer',background:sel?'#f0f9ff':'#f8fafc',transition:'all .15s'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:`linear-gradient(135deg,${ac[0]},${ac[1]})`}}/>
                      <div>
                        <p style={{fontSize:12,fontWeight:700}}>{acc.accountAlias}</p>
                        <p style={{fontSize:10,color:'#94a3b8'}}>{acc.bankName} · {acc.accountNumberMasked}</p>
                      </div>
                    </div>
                    <p style={{fontSize:13,fontWeight:800,color:sel?'#0891b2':'#0f172a',fontVariantNumeric:'tabular-nums'}}>{won(acc.balance)}</p>
                  </div>
                );
              })}
            </div>
            {errors.fromAccountId&&<p style={{fontSize:10,color:'#ef4444',marginTop:6}}>{errors.fromAccountId}</p>}
          </div>

          {/* 받는 사람 정보 */}
          <div style={{background:'#fff',borderRadius:16,padding:'18px 20px',boxShadow:'0 2px 12px rgba(0,0,0,.06)'}}>
            <p style={{fontSize:12,fontWeight:700,color:'#475569',marginBottom:12}}>받는 사람</p>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div>
                <label style={{fontSize:11,fontWeight:600,color:'#64748b',display:'block',marginBottom:5}}>은행</label>
                <select value={form.toBank} onChange={e=>setForm(f=>({...f,toBank:e.target.value}))}
                  style={{...inputStyle(false),appearance:'none'}}>
                  {BANKS.map(b=><option key={b} value={b}>{b}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:600,color:'#64748b',display:'block',marginBottom:5}}>계좌번호</label>
                <input value={form.toNumber} onChange={e=>setForm(f=>({...f,toNumber:e.target.value}))}
                  placeholder="숫자만 입력" style={inputStyle(errors.toNumber)} maxLength={16}/>
                {errors.toNumber&&<p style={{fontSize:10,color:'#ef4444',marginTop:4}}>{errors.toNumber}</p>}
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:600,color:'#64748b',display:'block',marginBottom:5}}>받는 사람 이름</label>
                <input value={form.toName} onChange={e=>setForm(f=>({...f,toName:e.target.value}))}
                  placeholder="예: 김민수" style={inputStyle(errors.toName)}/>
                {errors.toName&&<p style={{fontSize:10,color:'#ef4444',marginTop:4}}>{errors.toName}</p>}
                {/* 최근 송금 */}
                <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                  {KNOWN_RECIPIENTS.slice(0,4).map(n=>(
                    <button key={n} onClick={()=>setForm(f=>({...f,toName:n}))}
                      style={{padding:'4px 10px',background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',transition:'background .15s'}}
                      onMouseEnter={e=>e.target.style.background='#e2e8f0'}
                      onMouseLeave={e=>e.target.style.background='#f1f5f9'}>{n}</button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* 금액 + 메모 */}
          <div style={{background:'#fff',borderRadius:16,padding:'18px 20px',boxShadow:'0 2px 12px rgba(0,0,0,.06)'}}>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,fontWeight:600,color:'#64748b',display:'block',marginBottom:5}}>송금 금액</label>
              <div style={{position:'relative'}}>
                <span style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',fontSize:14,fontWeight:700,color:'#94a3b8'}}>₩</span>
                <input type="text" value={form.amount}
                  onChange={e=>{const v=e.target.value.replace(/\D/g,'');setForm(f=>({...f,amount:v?Number(v).toLocaleString('ko-KR'):''}));}}
                  placeholder="0" style={{width:'100%',padding:'10px 13px',paddingLeft:28,border:'1.5px solid #e2e8f0',borderRadius:10,fontSize:20,fontWeight:900,outline:'none',background:'#f8fafc'}}/>
              </div>
              {errors.amount&&<p style={{fontSize:10,color:'#ef4444',marginTop:4}}>{errors.amount}</p>}
              {fromAccount&&amountNum>0&&(
                <p style={{fontSize:10,color:amountNum>fromAccount.balance?'#ef4444':'#94a3b8',marginTop:4}}>
                  잔액: {won(fromAccount.balance)} · 송금 후: {won(fromAccount.balance-amountNum)}
                </p>
              )}
              <div style={{display:'flex',gap:6,marginTop:8}}>
                {[10000,50000,100000,300000].map(v=>(
                  <button key={v} onClick={()=>setForm(f=>({...f,amount:v.toLocaleString('ko-KR')}))}
                    style={{flex:1,padding:'6px 0',background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:8,fontSize:11,fontWeight:700,cursor:'pointer'}}
                    onMouseEnter={e=>e.target.style.background='#e2e8f0'}
                    onMouseLeave={e=>e.target.style.background='#f1f5f9'}>+{(v/10000).toLocaleString()}만</button>
                ))}
              </div>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:'#64748b',display:'block',marginBottom:5}}>메모 <span style={{fontWeight:400,color:'#94a3b8'}}>(선택)</span></label>
              <input value={form.memo} onChange={e=>setForm(f=>({...f,memo:e.target.value}))}
                placeholder="예: 점심값 정산" style={inputStyle(false)}/>
            </div>
          </div>

          <button onClick={handleConfirm}
            style={{padding:'14px',background:'#0f172a',color:'#fff',border:'none',borderRadius:14,fontWeight:700,fontSize:14,transition:'opacity .15s'}}
            onMouseEnter={e=>e.currentTarget.style.opacity='.85'}
            onMouseLeave={e=>e.currentTarget.style.opacity='1'}>

          </button>

          <div style={{background:'#fff',borderRadius:16,padding:'18px 20px',boxShadow:'0 2px 12px rgba(0,0,0,.06)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>

                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>

            {!isAnalyzing && analysis && (

function Toggle({on, onChange}) {
  return (
    <div onClick={()=>onChange(!on)} style={{width:42,height:24,borderRadius:12,background:on?'#0891b2':'#e2e8f0',cursor:'pointer',position:'relative',transition:'background .2s',flexShrink:0}}>
      <div style={{position:'absolute',top:3,left:on?19:3,width:18,height:18,borderRadius:'50%',background:'#fff',boxShadow:'0 1px 3px rgba(0,0,0,.2)',transition:'left .2s'}}/>
    </div>
  );
}

function ToastMsg({msg, type, onDone}) {
  useEffect(()=>{ const t=setTimeout(onDone,2200); return ()=>clearTimeout(t); },[]);
  return (
    <div style={{position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',background:type==='ok'?'#0f172a':'#ef4444',color:'#fff',padding:'10px 20px',borderRadius:12,fontSize:12,fontWeight:700,zIndex:500,boxShadow:'0 8px 24px rgba(0,0,0,.18)',animation:'fadeSlideUp .3s ease',whiteSpace:'nowrap'}}>
      {type==='ok'?'✓ ':''}{msg}
    </div>
  );
}

function SettingRow({label, sub, children, danger}) {
  return (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 0',borderBottom:'1px solid #f8fafc'}}>
      <div>
        <p style={{fontSize:13,fontWeight:600,color:danger?'#ef4444':'#0f172a'}}>{label}</p>
        {sub&&<p style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{sub}</p>}
      </div>
      <div style={{flexShrink:0,marginLeft:12}}>{children}</div>
    </div>
  );
}

function SettingSection({title, children}) {
  return (
    <div style={{background:'#fff',borderRadius:16,padding:'16px 20px',boxShadow:'0 2px 12px rgba(0,0,0,.05)',marginBottom:14}}>

      {children}
    </div>
  );
}

    tps:   [{v:18},{v:22},{v:19},{v:25},{v:21},{v:24}],
    succ:  [{v:94},{v:96},{v:95},{v:97},{v:93},{v:96}],
    fail:  [{v:3}, {v:2}, {v:4}, {v:2}, {v:5}, {v:3}],
    users: [{v:142},{v:158},{v:167},{v:155},{v:172},{v:181}],
  });

  // live feed simulation
  useEffect(()=>{
    const t = setInterval(()=>{
      setLogs(prev=>{
        const next=[generateLog(), ...prev].slice(0,30);
        return next;
      });
      setTps(Math.floor(Math.random()*20)+18);
    }, 2200);
    return ()=>clearInterval(t);
  },[]);

  const handleRollback = id => setLogs(prev=>prev.map(l=>l.id===id?{...l,status:'success',ms:l.ms+120}:l));
  const handleRetry    = id => setLogs(prev=>prev.map(l=>l.id===id?{...l,status:'pending'}:l));

  const successCount = logs.filter(l=>l.status==='success').length;
  const failedCount  = logs.filter(l=>l.status==='failed').length;
  const successRate  = Math.round(successCount/logs.length*100);

  return (
    <div className="anim-up" style={{flex:1,overflowY:'auto',padding:24,paddingBottom:40}}>
      <div style={{maxWidth:1100,margin:'0 auto',display:'flex',flexDirection:'column',gap:16}}>

        {/* KPI grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
          <KpiCard label="실시간 TPS" value={tps} sub="초당 트랜잭션 수" color="#0891b2" sparkData={kpiHistory.tps.map(d=>({...d,label:''}))} idx={0}/>
          <KpiCard label="성공률" value={`${successRate}%`} sub={`${successCount}건 성공`} color="#10b981" sparkData={kpiHistory.succ.map(d=>({...d,label:''}))} idx={1}/>
          <KpiCard label="실패율" value={`${Math.round(failedCount/logs.length*100)}%`} sub={`${failedCount}건 실패`} color="#ef4444" sparkData={kpiHistory.fail.map(d=>({...d,label:''}))} idx={2}/>
          <KpiCard label="활성 사용자" value="181" sub="지난 1시간 기준" color="#8b5cf6" sparkData={kpiHistory.users.map(d=>({...d,label:''}))} idx={3}/>
        </div>

        {/* Pipeline map */}
        <PipelineMap latestLog={logs[0]}/>

        {/* Log + policy */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:16,minHeight:380}}>
          <LogFeed logs={logs} onRollback={handleRollback} onRetry={handleRetry}/>
          <PolicyPanel policy={policy} setPolicy={setPolicy}/>
        </div>
      </div>
    </div>
  );
}

function avatarColor(name) {
  const colors = ['#0f172a','#0891b2','#1e3a8a','#065f46','#1e40af','#374151','#0c4a6e','#1d4ed8'];
  let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))%colors.length;
  return colors[h];
}

function AdminPoliciesView() {
  const [saved, setSaved]     = useState(POLICY_DEFAULTS);
  const [draft, setDraft]     = useState(JSON.parse(JSON.stringify(POLICY_DEFAULTS)));
  const [history, setHistory] = useState(POLICY_HISTORY_INIT);
  const [saveModal, setSaveModal] = useState(false);
  const [savedToast, setSavedToast] = useState(false);

  const setDraftVal = (group, key, val) =>
    setDraft(d => ({...d, [group]: {...d[group], [key]: val}}));

  // 변경된 항목 계산
  const changes = [];
  const LABELS = {
    dailyLimit:'일일 송금 한도', singleLimit:'1회 송금 한도', maxTxPerDay:'최대 처리 건수',
    feeRate:'수수료율', minFee:'최소 수수료', maxFee:'최대 수수료',
    aiEnabled:'AI 분석', autoBlock:'위험 거래 자동 차단', requireApproval:'관리자 승인 필요',
    dangerThreshold:'위험 임계치', cautionThreshold:'경고 임계치',
  };
  const FMT = {
    dailyLimit:v=>'₩'+v.toLocaleString('ko-KR'), singleLimit:v=>'₩'+v.toLocaleString('ko-KR'),
    maxTxPerDay:v=>v.toLocaleString('ko-KR')+'건', feeRate:v=>v+'%',
    minFee:v=>'₩'+v.toLocaleString('ko-KR'), maxFee:v=>'₩'+v.toLocaleString('ko-KR'),
    aiEnabled:v=>v?'ON':'OFF', autoBlock:v=>v?'ON':'OFF', requireApproval:v=>v?'ON':'OFF',
    dangerThreshold:v=>v+'점', cautionThreshold:v=>v+'점',
  };
  ['transfer','fee','risk'].forEach(g=>{
    Object.keys(draft[g]).forEach(k=>{
      if(JSON.stringify(draft[g][k])!==JSON.stringify(saved[g][k])){
        changes.push({group:g, key:k, label:LABELS[k]||k,
          before: FMT[k]?FMT[k](saved[g][k]):String(saved[g][k]),
          after:  FMT[k]?FMT[k](draft[g][k]):String(draft[g][k])});
      }
    });
  });

  const handleSave = () => {
    const now = new Date();
    const dt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const newEntries = changes.map((c,i) => ({id:Date.now()+i, dt, admin:'admin', policy:c.label, before:c.before, after:c.after, reason:'관리자 변경'}));
    setHistory(prev=>[...newEntries,...prev]);
    setSaved(JSON.parse(JSON.stringify(draft)));
    setSaveModal(false);
    setSavedToast(true);
    setTimeout(()=>setSavedToast(false), 2500);

          </div>
          <div style={{maxHeight:240,overflowY:'auto'}}>
            {history.map((h,i)=>(
              <div key={h.id} style={{display:'grid',gridTemplateColumns:'140px 80px 1fr 100px 100px 1fr',gap:0,padding:'10px 20px',borderBottom:'1px solid #f8fafc',background:i===0&&history.length>POLICY_HISTORY_INIT.length?'#f0fdf4':'#fff'}}>
                <span style={{fontSize:11,color:'#64748b',fontFamily:'monospace'}}>{h.dt}</span>
                <span style={{fontSize:11,fontWeight:700,color:'#0891b2'}}>{h.admin}</span>
                <span style={{fontSize:11,fontWeight:600}}>{h.policy}</span>
                <span style={{fontSize:11,color:'#94a3b8',textDecoration:'line-through'}}>{h.before}</span>
                <span style={{fontSize:11,fontWeight:700,color:'#0f172a'}}>{h.after}</span>
                <span style={{fontSize:11,color:'#64748b'}}>{h.reason}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* 저장 확인 모달 */}
      {saveModal&&(
        <div onClick={()=>setSaveModal(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:400,backdropFilter:'blur(2px)'}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:20,padding:'28px 24px',width:380,boxShadow:'0 20px 60px rgba(0,0,0,.18)',animation:'fadeSlideUp .3s ease'}}>
            <h3 style={{fontSize:15,fontWeight:800,marginBottom:8}}>정책을 변경하시겠습니까?</h3>
            <p style={{fontSize:12,color:'#64748b',marginBottom:16}}>다음 {changes.length}개 항목이 즉시 적용됩니다:</p>
            <div style={{background:'#f8fafc',borderRadius:10,padding:'10px 14px',marginBottom:20,display:'flex',flexDirection:'column',gap:6}}>
              {changes.map((c,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:11,fontWeight:600}}>{c.label}</span>
                  <div style={{display:'flex',gap:4,alignItems:'center'}}>
                    <span style={{fontSize:10,color:'#94a3b8',textDecoration:'line-through'}}>{c.before}</span>
                    <span style={{fontSize:9,color:'#94a3b8'}}>→</span>
                    <span style={{fontSize:11,fontWeight:700,color:'#d97706'}}>{c.after}</span>
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setSaveModal(false)} style={{flex:1,padding:'11px',background:'#f1f5f9',border:'none',borderRadius:12,fontWeight:700,fontSize:13,cursor:'pointer'}}>취소</button>
              <button onClick={handleSave} style={{flex:1,padding:'11px',background:'#0f172a',color:'#fff',border:'none',borderRadius:12,fontWeight:700,fontSize:13,cursor:'pointer'}}>정책 적용</button>
            </div>
          </div>
        </div>
      )}

      {/* 저장 완료 토스트 */}
      {savedToast&&(
        <div style={{position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',background:'#0f172a',color:'#fff',padding:'10px 20px',borderRadius:12,fontSize:12,fontWeight:700,zIndex:500,boxShadow:'0 8px 24px rgba(0,0,0,.18)',animation:'fadeSlideUp .3s ease',whiteSpace:'nowrap'}}>
          ✓ 정책이 적용되었습니다
        </div>
      )}
    </div>
  );
}

function AdminLogsView() {
  const TYPE_COLOR = {INFO:{c:'#0891b2',bg:'#f0f9ff'},WARN:{c:'#ca8a04',bg:'#fefce8'},ERROR:{c:'#dc2626',bg:'#fef2f2'},DEBUG:{c:'#7c3aed',bg:'#faf5ff'}};
  const [logs] = useState(()=>{
    const types=['INFO','WARN','ERROR','DEBUG'];
    const svcs=['transfer-service','auth-service','account-service','notification-service','risk-analyzer'];
    const msgs=['POST /api/transfers — 200 OK','GET /api/accounts — 200 OK','PATCH /api/accounts/{id}/primary — 200 OK','POST /api/transfers/analyze — 200 OK','DELETE /api/accounts/acc4 — 404 Not Found','POST /api/auth/login — 401 Unauthorized','Risk analysis completed: CAUTION','Kafka event published: TRANSFER_COMPLETED','DB connection pool: 42/100','Cache hit rate: 87.3%'];
    return Array.from({length:30},(_,i)=>{
      const d=new Date(Date.now()-i*65000);
      const pd=n=>String(n).padStart(2,'0');
      return {id:i,time:`${pd(d.getHours())}:${pd(d.getMinutes())}:${pd(d.getSeconds())}`,type:types[Math.floor(Math.random()*types.length)],service:svcs[Math.floor(Math.random()*svcs.length)],message:msgs[Math.floor(Math.random()*msgs.length)]};
    });
  });
  const [typeFilter, setTypeFilter] = useState('all');
  const filtered = logs.filter(l=>typeFilter==='all'||l.type===typeFilter);
  return (
    <div className="anim-up" style={{flex:1,overflowY:'auto',padding:24,paddingBottom:40}}>
      <div style={{maxWidth:1000,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div><h2 style={{fontSize:17,fontWeight:800}}>시스템 로그</h2><p style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{filtered.length}건 표시</p></div>
          <div style={{display:'flex',gap:6}}>
            {['all','INFO','WARN','ERROR','DEBUG'].map(f=>(
              <button key={f} onClick={()=>setTypeFilter(f)} style={{padding:'7px 12px',background:typeFilter===f?'#0f172a':'#f1f5f9',color:typeFilter===f?'#fff':'#334155',border:'none',borderRadius:9,fontSize:11,fontWeight:700,cursor:'pointer'}}>
                {f==='all'?'전체':f}
              </button>
            ))}
          </div>
        </div>
        <div style={{background:'#0f172a',borderRadius:16,overflow:'hidden',boxShadow:'0 4px 20px rgba(0,0,0,.15)'}}>
          <div style={{padding:'10px 16px',borderBottom:'1px solid #1e293b',display:'flex',gap:12,alignItems:'center'}}>
            <div className="live-dot"/>
            <span style={{fontSize:11,color:'#94a3b8',fontFamily:'monospace'}}>System Log Monitor</span>
          </div>
          <div style={{maxHeight:1200,overflowY:'auto',fontFamily:'monospace'}}>
            {filtered.map(log=>{
              const tc=TYPE_COLOR[log.type]||{c:'#94a3b8',bg:'transparent'};
              return (
                <div key={log.id} style={{display:'flex',gap:10,padding:'7px 16px',borderBottom:'1px solid #1e293b',alignItems:'flex-start',background:log.type==='ERROR'?'rgba(239,68,68,.08)':log.type==='WARN'?'rgba(234,179,8,.05)':'transparent'}}>
                  <span style={{fontSize:10,color:'#475569',width:56,flexShrink:0}}>{log.time}</span>
                  <span style={{fontSize:9,fontWeight:800,padding:'2px 7px',borderRadius:4,background:tc.bg,color:tc.c,flexShrink:0,width:44,textAlign:'center'}}>{log.type}</span>
                  <span style={{fontSize:10,color:'#64748b',width:140,flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{log.service}</span>
                  <span style={{fontSize:11,color:'#e2e8f0',flex:1}}>{log.message}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

          </div>
          <div style={{background:mode==='admin'?'rgba(255,255,255,.07)':'#f8fafc',borderRadius:10,padding:'8px 10px',display:'flex',gap:8,alignItems:'center'}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:mode==='admin'?'#22d3ee':'#0891b2',display:'flex',alignItems:'center',justifyContent:'center',color:mode==='admin'?'#0f172a':'#fff',fontWeight:800,fontSize:12,flexShrink:0}}>소</div>
            <div style={{minWidth:0}}>
              <p style={{fontSize:11,fontWeight:700,color:mode==='admin'?'#fff':'#0f172a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>소윤 님</p>
              <p style={{fontSize:9,color:mode==='admin'?'rgba(255,255,255,.5)':'#94a3b8'}}>{mode==='admin'?'관리자':'일반 사용자'}</p>
            </div>
          </div>
        </div>

        {/* Nav */}
        <nav style={{flex:1,padding:'10px 10px',display:'flex',flexDirection:'column',gap:2,overflowY:'auto'}}>
          {currentMenu.map(m=>{
            const isActive = m.page===screen;
            const adminActive = {background:'rgba(34,211,238,.15)',color:'#22d3ee'};
            const userActive  = {background:'#0f172a',color:'#fff'};
            const activeSt = isActive?(mode==='admin'?adminActive:userActive):{};
            return (
              <button key={m.page} onClick={()=>navigate(m.page)}
                style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:isActive?(mode==='admin'?'rgba(34,211,238,.12)':'#0f172a'):'transparent',border:isActive&&mode==='admin'?'1px solid rgba(34,211,238,.25)':'1px solid transparent',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:600,color:isActive?(mode==='admin'?'#22d3ee':'#fff'):(mode==='admin'?'rgba(255,255,255,.65)':'#334155'),textAlign:'left',width:'100%',transition:'all .15s'}}
                onMouseEnter={e=>{ if(!isActive) e.currentTarget.style.background=mode==='admin'?'rgba(255,255,255,.06)':'#f8fafc'; }}
                onMouseLeave={e=>{ if(!isActive) e.currentTarget.style.background='transparent'; }}>
                <span style={{fontSize:14,flexShrink:0}}>{m.icon}</span>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.label}</span>
                {isActive&&<div style={{marginLeft:'auto',width:4,height:4,borderRadius:'50%',background:mode==='admin'?'#22d3ee':'#fff',flexShrink:0}}/>}
              </button>
            );
          })}
        </nav>

        <div style={{padding:'12px',borderTop:'1px solid '+(mode==='admin'?'rgba(255,255,255,.08)':'#f1f5f9')}}>
          <button style={{width:'100%',padding:'9px',background:mode==='admin'?'rgba(255,255,255,.06)':'#fef2f2',border:'none',borderRadius:8,fontWeight:700,fontSize:11,color:mode==='admin'?'rgba(255,255,255,.5)':'#ef4444',cursor:'pointer'}}>로그아웃</button>
        </div>
      </aside>

      {/* ── Main content ── */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Top bar */}
        <header style={{height:56,background:'#fff',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {mode==='admin'&&<span style={{fontSize:9,fontWeight:800,background:'#0f172a',color:'#22d3ee',padding:'3px 8px',borderRadius:20,letterSpacing:'1px',textTransform:'uppercase'}}>ADMIN</span>}
            <div>
              <h2 style={{fontSize:15,fontWeight:800}}>{PAGE_TITLE[screen]||'페이지'}</h2>
              <p style={{fontSize:11,color:'#94a3b8',marginTop:1}}>EzPay · 2026년 6월 21일</p>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            {/* Mode toggle pill */}
            <div style={{display:'flex',background:'#f1f5f9',borderRadius:20,padding:3,gap:2}}>
              <button onClick={()=>switchMode('user')}
                style={{padding:'5px 14px',borderRadius:16,border:'none',fontSize:11,fontWeight:700,cursor:'pointer',background:mode==='user'?'#0f172a':'transparent',color:mode==='user'?'#fff':'#64748b',transition:'all .2s',display:'flex',alignItems:'center',gap:5}}>
                {mode==='user'&&<div style={{width:6,height:6,borderRadius:'50%',background:'#22d3ee'}}/>}
                사용자 뷰
              </button>
              {IS_ADMIN&&(
                <button onClick={()=>switchMode('admin')}
                  style={{padding:'5px 14px',borderRadius:16,border:'none',fontSize:11,fontWeight:700,cursor:'pointer',background:mode==='admin'?'#0f172a':'transparent',color:mode==='admin'?'#22d3ee':'#64748b',transition:'all .2s',display:'flex',alignItems:'center',gap:5}}>
                  {mode==='admin'&&<div style={{width:6,height:6,borderRadius:'50%',background:'#22d3ee'}}/>}
                  관리자 뷰
                </button>
              )}
            </div>
            {/* Notification */}
            <div ref={notiRef} style={{position:'relative'}}>
              <button onClick={()=>setNotiOpen(v=>!v)} style={{position:'relative',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:10,width:38,height:38,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#334155" strokeWidth="2" strokeLinecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                {unread>0&&<span style={{position:'absolute',top:4,right:4,width:14,height:14,borderRadius:'50%',background:'#ef4444',color:'#fff',fontSize:8,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>{unread}</span>}
              </button>
              {notiOpen&&(
                <div style={{position:'absolute',top:'calc(100% + 8px)',right:0,width:310,background:'#fff',borderRadius:14,boxShadow:'0 10px 40px rgba(0,0,0,.15)',zIndex:200,overflow:'hidden'}}>
                  <div style={{padding:'12px 16px',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between'}}>
                    <span style={{fontWeight:700,fontSize:13}}>알림</span>
                    <span onClick={()=>setNotis(prev=>prev.map(n=>({...n,read:true})))} style={{fontSize:11,color:'#0891b2',cursor:'pointer',fontWeight:600}}>모두 읽음</span>
                  </div>
                  {notis.map(n=>{
                    const col={done:'#10b981',receive:'#0891b2',alert:'#ef4444'}[n.type];
                    return (
                      <div key={n.id} onClick={()=>setNotis(prev=>prev.map(p=>p.id===n.id?{...p,read:true}:p))} style={{padding:'11px 16px',borderBottom:'1px solid #f8fafc',cursor:'pointer',background:n.read?'#fff':'#fafafa'}}>
                        <div style={{display:'flex',gap:9,alignItems:'flex-start'}}>
                          <div style={{width:7,height:7,borderRadius:'50%',background:n.read?'#e2e8f0':col,marginTop:5,flexShrink:0}}/>
                          <div>
                            <p style={{fontSize:12,fontWeight:n.read?500:700}}>{n.title}</p>
                            <p style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{n.sub}</p>
                            <p style={{fontSize:10,color:'#cbd5e1',marginTop:2}}>{n.time}</p>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </header>

        {/* Page content */}
        <div style={{flex:1,overflow:'hidden',display:'flex'}}>
          {mode==='user' && screen==='dashboard' && <UserMain transactions={TXNS_DATA} onSelectTx={(tx)=>{setSelTx(tx);setScreen('detail');}} onMoreClick={(page,r)=>{if(r){setTransferRecipient(r);}setScreen(page||'history');}}/>}
          {mode==='user' && screen==='detail' && selTx && <TxDetail tx={selTx} onBack={()=>{setSelTx(null);setScreen('dashboard');}}/>}
          {mode==='user' && screen==='accounts' && <AccountsView/>}
          {mode==='user' && screen==='transfer' && <TransferView prefilledRecipient={transferRecipient} onClearRecipient={()=>setTransferRecipient(null)} onGoFriends={()=>setScreen('friends')}/>}
          {mode==='user' && screen==='friends' && <FriendsView onTransfer={(r)=>{setTransferRecipient(r);setScreen('transfer');}}/>}
          {mode==='user' && screen==='history' && <HistoryView onSelectTx={(tx)=>{setSelTx(tx);setScreen('detail');}}/>}
          {mode==='user' && screen==='notifications' && (
            <div style={{flex:1,display:'flex',flexDirection:'column',padding:24,paddingBottom:40}}>
              <div style={{maxWidth:680,margin:'0 auto',width:'100%'}}>
                <h2 style={{fontSize:18,fontWeight:800,marginBottom:16}}>알림</h2>
                <div style={{background:'#fff',borderRadius:16,overflow:'hidden',boxShadow:'0 2px 12px rgba(0,0,0,.06)'}}>
                  {notis.map((n,i)=>{
                    const col={done:'#10b981',receive:'#0891b2',alert:'#ef4444'}[n.type];
                    return (
                      <div key={n.id} onClick={()=>setNotis(prev=>prev.map(p=>p.id===n.id?{...p,read:true}:p))}
                        style={{display:'flex',gap:14,padding:'16px 20px',borderBottom:i<notis.length-1?'1px solid #f8fafc':'none',cursor:'pointer',background:n.read?'#fff':'#fafbff'}}>
                        <div style={{width:36,height:36,borderRadius:'50%',background:n.read?'#f1f5f9':col+'22',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                          <div style={{width:10,height:10,borderRadius:'50%',background:n.read?'#cbd5e1':col}}/>
                        </div>
                        <div style={{flex:1}}>
                          <p style={{fontSize:13,fontWeight:n.read?500:700,color:'#0f172a'}}>{n.title}</p>
                          <p style={{fontSize:12,color:'#64748b',marginTop:3}}>{n.sub}</p>
                          <p style={{fontSize:10,color:'#cbd5e1',marginTop:4}}>{n.time}</p>
                        </div>
                        {!n.read&&<div style={{width:8,height:8,borderRadius:'50%',background:col,flexShrink:0,marginTop:4}}/>}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
          {mode==='user' && screen==='settings' && <SettingsView/>}
          {mode==='admin' && screen==='admin'              && <AdminView/>}
          {mode==='admin' && screen==='admin-users'        && <AdminUsersView/>}
          {mode==='admin' && screen==='admin-transactions' && <AdminTransactionsView/>}
          {mode==='admin' && screen==='admin-risk'         && <AdminRiskView/>}
          {mode==='admin' && screen==='admin-logs'         && <AdminLogsView/>}
          {mode==='admin' && screen==='admin-policies' && <AdminPoliciesView/>}
          {mode==='admin' && screen==='admin-settings' && <AdminSettingsView/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body></html>
