server:
  port: ${PORT:${SERVER_PORT:8081}}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  main:
    allow-bean-definition-overriding: true
  application:
    name: EzPay  # 애플리케이션 이름
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ezpay}}}
    username: ${DB_USERNAME:${DB_USER:${SPRING_DATASOURCE_USERNAME:postgres}}}
    password: ${DB_PASSWORD:${DB_PASS:${SPRING_DATASOURCE_PASSWORD:password}}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  task:
    execution:
      pool:
        core-size: 10  # 기본 스레드 수
        max-size: 100  # 최대 스레드 수
        queue-capacity: 500  # 대기 큐 사이즈
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
    defer-datasource-initialization: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: ${SPRING_KAFKA_LISTENER_AUTO_STARTUP:false}

logging:
  level:
    org:
      hibernate:
        SQL: ${LOGGING_LEVEL_ORG_HIBERNATE_SQL:INFO}
        type:
          descriptor:
            sql:
              BasicBinder: ${LOGGING_LEVEL_ORG_HIBERNATE_BINDER:INFO}
      springframework:
        security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

sentry:
  dsn: ${SENTRY_DSN:}
  send-default-pii: true

ezpay:
  kafka:
    enabled: ${EZPAY_KAFKA_ENABLED:false}
  internal-api:
    secret-key: ${EZPAY_INTERNAL_API_SECRET_KEY:change-me-in-production}

---
spring:
  config:
    activate:
      on-profile: local

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
      springframework:
        security: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  sql:
    init:
      mode: never
