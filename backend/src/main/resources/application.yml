server:
  port: ${SERVER_PORT:8081}

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: EzPay  # 애플리케이션 이름
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver  # PostgreSQL 드라이버 설정
    hikari:
      maximum-pool-size: 10  # 커넥션 풀 최대 크기
      connection-timeout: 30000  # 커넥션 타임아웃 30초

  task:
    execution:
      pool:
        core-size: 10  # 기본 스레드 수
        max-size: 100  # 최대 스레드 수
        queue-capacity: 500  # 대기 큐 사이즈
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect  # DB 방언 설정 (PostgreSQL)
    hibernate:
      ddl-auto: update  # 서버 시작 시 엔티티 기준으로 DB 스키마 자동 업데이트 (컬럼 추가 가능)
    show-sql: true  # 실행되는 SQL 콘솔 출력
    properties:
      hibernate:
        format_sql: true  # SQL 이쁘게 포맷팅
        jdbc:
          time_zone: Asia/Seoul  # DB 타임존 한국 시간으로 설정
    defer-datasource-initialization: true  # JPA 초기화 후 data.sql 실행

  sql:
    init:
      mode: always  # data.sql 항상 실행

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: ${SPRING_KAFKA_LISTENER_AUTO_STARTUP:false}

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG  # 하이버네이트 SQL 로그 레벨
        type:
          descriptor:
            sql:
              BasicBinder: TRACE  # 바인딩 값 출력
      springframework:
        security: DEBUG  # Spring Security 디버그 레벨


sentry:
  dsn: https://9f7f38650127a9230745a97cfc007353@o4509325284802560.ingest.us.sentry.io/4509325286244352
  send-default-pii: true

ezpay:
  kafka:
    enabled: ${EZPAY_KAFKA_ENABLED:false}
  internal-api:
    secret-key: "[REDACTED_SECRET_KEY]"
  plaid:
    client-id: ${PLAID_CLIENT_ID:}
    secret: ${PLAID_SECRET:}
    base-url: ${PLAID_BASE_URL:https://sandbox.plaid.com}
    client-name: ${PLAID_CLIENT_NAME:EzPay}
    language: ${PLAID_LANGUAGE:en}
    country-code: ${PLAID_COUNTRY_CODE:US}
    days-requested: ${PLAID_DAYS_REQUESTED:90}
    webhook-url: ${PLAID_WEBHOOK_URL:}
  kftc:
    enabled: ${EZPAY_KFTC_ENABLED:false}
    client-id: ${KFTC_CLIENT_ID:}
    client-secret: ${KFTC_CLIENT_SECRET:}
    base-url: ${KFTC_BASE_URL:https://openapi.openbanking.or.kr}
    authorize-url: ${KFTC_AUTHORIZE_URL:https://testapi.openbanking.or.kr/oauth/2.0/authorize_account}
    token-url: ${KFTC_TOKEN_URL:https://testapi.openbanking.or.kr/oauth/2.0/token}
    redirect-uri: ${KFTC_REDIRECT_URI:}
    client-use-code: ${KFTC_CLIENT_USE_CODE:}
    webhook-url: ${KFTC_WEBHOOK_URL:}
    scope: ${KFTC_SCOPE:login inquiry}
    fintech-use-num: ${KFTC_FINTECH_USE_NUM:}
    inquiry-start-date: ${KFTC_INQUIRY_START_DATE:20240101}
    inquiry-end-date: ${KFTC_INQUIRY_END_DATE:20241231}
    inquiry-bank-type: ${KFTC_INQUIRY_BANK_TYPE:1}
    auth-type: ${KFTC_AUTH_TYPE:0}
