server:
  port: ${PORT:${SERVER_PORT:8081}}

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: EzPay  # 애플리케이션 이름
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ezpay}}}
    username: ${DB_USERNAME:${DB_USER:${SPRING_DATASOURCE_USERNAME:postgres}}}
    password: ${DB_PASSWORD:${DB_PASS:${SPRING_DATASOURCE_PASSWORD:password}}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  task:
    execution:
      pool:
        core-size: 10  # 기본 스레드 수
        max-size: 100  # 최대 스레드 수
        queue-capacity: 500  # 대기 큐 사이즈
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:true}
        jdbc:
          time_zone: Asia/Seoul
    defer-datasource-initialization: true

  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:always}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: ${SPRING_KAFKA_LISTENER_AUTO_STARTUP:false}

logging:
  level:
    org:
      hibernate:
        SQL: ${LOGGING_LEVEL_ORG_HIBERNATE_SQL:DEBUG}
        type:
          descriptor:
            sql:
              BasicBinder: ${LOGGING_LEVEL_ORG_HIBERNATE_BINDER:TRACE}
      springframework:
        security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:DEBUG}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

sentry:
  dsn: https://9f7f38650127a9230745a97cfc007353@o4509325284802560.ingest.us.sentry.io/4509325286244352
  send-default-pii: true

ezpay:
  kafka:
    enabled: ${EZPAY_KAFKA_ENABLED:false}
  internal-api:
    secret-key: "[REDACTED_SECRET_KEY]"