# 테스트 전용 프로파일: 외부 인프라(PostgreSQL/Kafka/SMTP) 없이 Spring 컨텍스트를 로드한다.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

  # SMTP 플레이스홀더(${SMTP_USERNAME}) 미해결로 인한 컨텍스트 실패 방지용 더미 값
  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

ezpay:
  kafka:
    enabled: false
  internal-api:
    secret-key: test-secret-key

sentry:
  dsn: ""
